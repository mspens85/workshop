<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Pens</title>

<style>
body { font-family: Arial; padding: 15px; }

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}

textarea { height: 150px; }

.geraet {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 15px;
}

label { display: block; margin: 4px 0; }

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
}

@media print {

  body {
    font-size: 12px;
    padding: 5px;
  }

  h2, h3 {
    margin: 5px 0;
  }

  .geraet {
    margin-top: 8px;
    padding: 6px;
  }

  label {
    margin: 2px 0;
  }

  input {
    border: none;
    padding: 2px;
    margin: 2px 0;
  }

  textarea {
    border: none;
    padding: 2px;
    margin: 2px 0;

    /* 🔥 DAS ist der wichtige Teil */
    height: auto;
    min-height: 0;
    overflow: visible;
  }

  button {
    display: none;
  }
}
</style>

</head>

<body>

<h2 id="title">Werkstattzettel</h2>

<label>
  <input type="checkbox" id="angebotToggle">
  Angebotsmodus
</label>

<!-- Kundendaten -->

<h3>Kundendaten</h3>
<input id="name" placeholder="Name">
<input id="strasse" placeholder="Straße">
<input id="strasse2" placeholder="Straße 2">
<input id="plzort" placeholder="PLZ / Ort">
<input id="land" placeholder="Land">
<input id="extra" placeholder="Zusätzliches">
<input id="datum" placeholder="Datum">

<!-- Geräte -->

<h3>Geräte</h3>
<div id="container"></div>

<button id="addBtn">+ Gerät hinzufügen</button>

<!-- Gesamtpreis -->

<div id="gesamtBlock" style="display:none;">
  <h3>Gesamtpreis</h3>
  <input id="gesamtpreis" readonly>
</div>

<button id="printBtn">📄 Drucken / PDF</button> <button onclick="location.reload()">🔄 Zurücksetzen</button>

<script>

// Gerät erstellen
function createGeraet() {

  const div = document.createElement("div");
  div.className = "geraet";

  const modell = document.createElement("input");
  modell.placeholder = "Modell";

  const notizen = document.createElement("textarea");
  notizen.placeholder = "Notizen";

  const arbeiten = [
    "Demontage","Reinigung","Wartung Mechanik","Korkdichtung erneuern",
    "Politur einfach","Mehrstufige Handpolitur","Gravur entfernen",
    "Kappenriss schließen","Kappenlippe erneuern",
    "Clip/Kappenringe vergolden","Kappenstern erneuert",
    "Feder umschleifen","Schreibprobe"
  ];

  const arbeitenDiv = document.createElement("div");

  arbeiten.forEach(text => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";

    label.appendChild(cb);
    label.appendChild(document.createTextNode(" " + text));

    arbeitenDiv.appendChild(label);
  });

  const preis = document.createElement("input");
  preis.placeholder = "Einzelpreis €";
  preis.className = "preis";

  preis.addEventListener("input", updateSumme);

  div.appendChild(modell);
  div.appendChild(notizen);
  div.appendChild(arbeitenDiv);
  div.appendChild(preis);

  return div;
}

// Gerät hinzufügen
function addGeraet() {
  document.getElementById("container").appendChild(createGeraet());
}

// Summe
function updateSumme() {
  let sum = 0;

  document.querySelectorAll(".preis").forEach(el => {
    let v = parseFloat(el.value.replace(",", "."));
    if (!isNaN(v)) sum += v;
  });

  document.getElementById("gesamtpreis").value = sum.toFixed(2) + " €";
}

// Angebotsmodus
function toggleAngebot() {
  const aktiv = document.getElementById("angebotToggle").checked;

  document.getElementById("title").innerText = aktiv ? "Angebot" : "Werkstattzettel";
  document.getElementById("gesamtBlock").style.display = aktiv ? "block" : "none";

  // Preise nur im Angebot sichtbar
  document.querySelectorAll(".preis").forEach(p => {
    p.style.display = aktiv ? "block" : "none";
  });
}

// Drucken
function drucken() {

  // Arbeiten filtern
  document.querySelectorAll(".geraet label").forEach(label => {
    const cb = label.querySelector("input");
    if (!cb.checked) label.style.display = "none";
  });

  // Leere Felder ausblenden
  document.querySelectorAll("input, textarea").forEach(el => {
    if (!el.value) el.style.display = "none";
  });



  
  document.querySelectorAll("textarea").forEach(el => {
  el.style.height = "auto";
  el.style.height = el.scrollHeight + "px";
});

  

  window.print();
}

// Events
document.getElementById("addBtn").addEventListener("click", addGeraet);
document.getElementById("printBtn").addEventListener("click", drucken);
document.getElementById("angebotToggle").addEventListener("change", toggleAngebot);

// Start
addGeraet();

</script>

</body>
</html>
