<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Pens</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}

textarea {
  height: 120px;
}

.geraet {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 15px;
  border-radius: 8px;
}

label {
  display: block;
  margin: 4px 0;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
}

@media print {
  button { display: none; }
}
</style>

</head>

<body>

<h2 id="title">Werkstattzettel</h2>

<label>
  <input type="checkbox" id="angebotToggle" onchange="toggleAngebot()">
  Angebotsmodus
</label>

<h3>Kundendaten</h3>
<input id="name" placeholder="Name">
<input id="strasse" placeholder="Straße">
<input id="strasse2" placeholder="Straße 2">
<input id="plzort" placeholder="PLZ / Ort">
<input id="land" placeholder="Land">
<input id="extra" placeholder="Zusätzliches">
<input id="datum" placeholder="Datum">

<h3>Geräte</h3>
<div id="container"></div>

<button onclick="addGeraet()">+ Gerät hinzufügen</button>

<div id="gesamtBlock" style="display:none;">
  <h3>Gesamtpreis</h3>
  <input id="gesamtpreis" readonly>
</div>

<button onclick="drucken()">📄 Drucken / PDF</button> <button onclick="resetForm()">🔄 Zurücksetzen</button>

<script>

function addGeraet() {

  let div = document.createElement("div");
  div.className = "geraet";

  div.innerHTML = `
    <input class="modell" placeholder="Modell">

    <textarea placeholder="Notizen"></textarea>

```
<strong>Arbeiten:</strong>

<label><input type="checkbox"> Demontage</label>
<label><input type="checkbox"> Reinigung</label>
<label><input type="checkbox"> Wartung Mechanik</label>
<label><input type="checkbox"> Korkdichtung erneuern</label>
<label><input type="checkbox"> Politur einfach</label>
<label><input type="checkbox"> Mehrstufige Handpolitur</label>
<label><input type="checkbox"> Gravur entfernen</label>
<label><input type="checkbox"> Kappenriss schließen</label>
<label><input type="checkbox"> Kappenlippe erneuern</label>
<label><input type="checkbox"> Clip/Kappenringe vergolden</label>
<label><input type="checkbox"> Kappenstern erneuert</label>
<label><input type="checkbox"> Feder umschleifen</label>
<label><input type="checkbox"> Schreibprobe</label>

<input class="preis" placeholder="Einzelpreis €" oninput="summe()">
```

`;

document.getElementById("container").appendChild(div);
}

// Summe berechnen
function summe() {
let total = 0;

document.querySelectorAll(".preis").forEach(el => {
let v = parseFloat(el.value.replace(",", "."));
if (!isNaN(v)) total += v;
});

document.getElementById("gesamtpreis").value = total.toFixed(2) + " €";
}

// Angebot / Werkstatt
function toggleAngebot() {
let aktiv = document.getElementById("angebotToggle").checked;

document.getElementById("title").innerText = aktiv ? "Angebot" : "Werkstattzettel";
document.getElementById("gesamtBlock").style.display = aktiv ? "block" : "none";
}

// Drucken
function drucken() {

// nur angehakte Arbeiten anzeigen
document.querySelectorAll(".geraet").forEach(g => {
g.querySelectorAll("label").forEach(label => {
let cb = label.querySelector("input");
if (!cb.checked) label.style.display = "none";
});
});

// leere Felder ausblenden
document.querySelectorAll("input, textarea").forEach(el => {
if (!el.value) el.style.display = "none";
});

// Dateiname
let name = document.getElementById("name").value || "Kunde";
let modell = document.querySelector(".modell")?.value || "Füller";
let datum = document.getElementById("datum").value || new Date().toISOString().split("T")[0];

document.title = datum + "*" + name + "*" + modell;

window.print();
}

// Reset
function resetForm() {
location.reload();
}

// Startgerät
addGeraet();

</script>

</body>
</html>
