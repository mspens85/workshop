<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Pens Office</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    margin:0;
    background:#f3f3f3;
    padding:20px;
}

.wrapper{

    max-width:1100px;
    margin:auto;

    background:white;

    border-radius:12px;

    box-shadow:0 5px 20px rgba(0,0,0,.15);

    padding:30px;

}

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;

}

.logo{

    height:90px;

}

h1{

    margin:0;

}

.toolbar{

    display:flex;

    gap:10px;

    margin-bottom:30px;

}

    .geraet input,
.geraet textarea{

    margin-bottom:10px;

}

.removeBtn{

    background:#b40000;

    color:white;

    border:none;

}

.removeBtn:hover{

    background:#900;

}

 .arbeiten{

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:8px;

    margin:15px 0;

}

.arbeiten label{

    display:flex;

    align-items:center;

    gap:8px;

    padding:6px;

    border-radius:6px;

    cursor:pointer;

}

.arbeiten label:hover{

    background:#f3f3f3;

}

.arbeiten input{

    width:auto;

    margin:0;

}

.arbeiten label:has(input:checked){

    background:#e8f2ff;

}   

select,
button,
input,
textarea{

    width:100%;

    padding:8px;

    border-radius:8px;

    border:1px solid #bbb;

    font-size:14px;

}

button{

    cursor:pointer;

}

.section{

    display:none;

}

.section.active{

    display:block;

}

.buttons{

    display:flex;

    gap:10px;

    margin-top:40px;

}
    
.kundeGrid{

    display:grid;

    grid-template-columns:2fr 1fr;

    gap:25px;

}

.kundeGrid input{

    margin-bottom:8px;

}

.briefkopf{

    font-size:10px;

    color:#666;

    margin-bottom:8px;

}

#datum,
#belegnummer{

    text-align:right;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="header">

<div>

<img src="logo.png" class="logo">

</div>

<div>

<h1 id="title">Werkstattzettel</h1>

</div>

</div>

<div class="toolbar">

<select id="modus">

<option value="werkstatt">Werkstattzettel</option>

<option value="angebot">Angebot</option>

<option value="rechnung">Rechnung</option>

<option value="eigenbeleg">Eigenbeleg</option>

</select>

<select id="sprache">

<option value="de">Deutsch</option>

<option value="en">English</option>

</select>

</div>

<!-- Werkstatt -->
<div id="werkstatt" class="section active">

    <h2>Kundendaten</h2>

    <div class="kundeGrid">

        <div>

            <div class="briefkopf">
                MS Pens | Marco Schrage | Glindweg 13 | 22303 Hamburg
            </div>

            <input id="kundeName" placeholder="Name">

            <input id="kundeStrasse" placeholder="Straße">

            <input id="kundeZusatz" placeholder="Adresszusatz">

            <input id="kundeOrt" placeholder="PLZ / Ort">

            <input id="kundeRegion" placeholder="Bundesland / Region">

            <input id="kundeLand" placeholder="Land">

        </div>

        <div>

            <input id="datum">

            <input id="belegnummer" placeholder="Werkstattnummer">

        </div>

    </div>

    <h2 style="margin-top:35px;">Geräte</h2>

    <div id="geraeteContainer">

    </div>

    <button id="addGeraetBtn">
        + Gerät hinzufügen
    </button>

<h2 style="margin-top:35px;">Werkzeuge / Artikel</h2>

<div id="werkzeugContainer">

</div>

<button id="addArtikelBtn">
    + Artikel hinzufügen
</button>

<div style="margin-top:25px;text-align:right;font-size:22px;font-weight:bold;">

Gesamt:
<span id="werkstattSumme">

0,00 €

</span>

</div>
    
</div>

<!-- Angebot -->

<div id="angebot" class="section">

<h2>Angebot</h2>

<table id="positionsTabelle"
style="width:100%;border-collapse:collapse;">

<thead>

<tr>

<th style="width:60px;">Pos</th>
<th style="width:90px;">Art.-Nr.</th>
<th>Beschreibung</th>
<th style="width:70px;">Menge</th>
<th style="width:120px;">Einzelpreis</th>
<th style="width:120px;">Gesamt</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<!-- Rechnung -->

<div id="rechnung" class="section">

<h2>Rechnung</h2>

<table id="positionsTabelleRechnung"
style="width:100%;border-collapse:collapse;">

<thead>

<tr>

<th style="width:60px;">Pos</th>
<th style="width:90px;">Art.-Nr.</th>
<th>Beschreibung</th>
<th style="width:70px;">Menge</th>
<th style="width:120px;">Einzelpreis</th>
<th style="width:120px;">Gesamt</th>

</tr>

</thead>

<tbody>

</tbody>

</table>

</div>

<!-- Eigenbeleg -->

<div id="eigenbeleg" class="section">

<h2>Eigenbeleg</h2>

<p>Eigenbelegbereich folgt…</p>

</div>

<div class="buttons">

<button id="printBtn">

📄 Drucken

</button>

<button id="resetBtn">

🔄 Reset

</button>

</div>

</div>

   <script>

const app={

    modus:"werkstatt",

    sprache:"de"

};

const artikelListe = {
  "CORK2": { name: "Dichtkorken Größe 2", preis: 20 },
  "CORK4": { name: "Dichtkorken Größe 4", preis: 20 },
  "CORK6": { name: "Dichtkorken Größe 6", preis: 20 },
  "CORK9": { name: "Dichtkorken Größe 9", preis: 20 },

  "PTM": { name: "Werkzeug für die Kolbeneinheit modern", preis: 39 },
  "PTA": { name: "Werkzeug für die Kolbeneinheit antik", preis: 39 },

  "NTM6": { name: "Federeinheit Werkzeug modern Größe 6", preis: 60 },
  "NTM9": { name: "Federeinheit Werkzeug modern Größe 9", preis: 60 },

  "NTA2": { name: "Federeinheit Werkzeug antik Größe 2", preis: 60 },
  "NTA4": { name: "Federeinheit Werkzeug antik Größe 4", preis: 60 },
  "NTA6": { name: "Federeinheit Werkzeug antik Größe 6", preis: 60 },
  "NTA9": { name: "Federeinheit Werkzeug antik Größe 9", preis: 60 },

  "CORKTOOL": { name: "Werkzeug Korkmutter", preis: 60 },
  "CORKPUSH": { name: "Eindrückhilfe Dichtkorken", preis: 60 },
  "CORKNUT": { name: "Hartgummimutter", preis: 25 },

  "GREASE": { name: "Schmierfett", preis: 4.5 },
  "SEALING": { name: "Dichtwachs", preis: 4.5 },

  "KOB": { name: "Knockout-Block", preis: 60 },
  "SET": { name: "Werkzeug Set komplett", preis: 600 },

  "SHIP1": { name: "Versandkosten", preis: 3.99 },
  "SHIP2": { name: "Versandkosten", preis: 6.19 },
  "SHIP3": { name: "Versandkosten", preis: 14.49 },
  "SHIP4": { name: "Versandkosten", preis: 15.99 }
};


function addGeraet(){

    const container = document.getElementById("geraeteContainer");

    const div = document.createElement("div");
    div.className = "geraet";

    div.innerHTML = `

<input class="modell" placeholder="Modell">

<textarea
class="notizen"
rows="3"
placeholder="Notizen"></textarea>

<div class="arbeiten">

<label><input type="checkbox">Demontage</label>
<label><input type="checkbox">Reinigung</label>
<label><input type="checkbox">Wartung Mechanik</label>
<label><input type="checkbox">Korkdichtung erneuern</label>
<label><input type="checkbox">Politur einfach</label>
<label><input type="checkbox">Mehrstufige Handpolitur</label>
<label><input type="checkbox">Gravur entfernen</label>
<label><input type="checkbox">Kappenriss schließen</label>
<label><input type="checkbox">Kappenlippe erneuern</label>
<label><input type="checkbox">Clip/Kappenringe vergolden</label>
<label><input type="checkbox">Kappenstern erneuert</label>
<label><input type="checkbox">Feder umschleifen</label>
<label><input type="checkbox">Schreibprobe</label>

</div>

<input
class="preis"
type="number"
step="0.01"
min="0"
placeholder="Preis €">

<button
type="button"
class="removeBtn">

Gerät löschen

</button>

`;

    div.querySelector(".removeBtn").addEventListener("click",function(){

        div.remove();

        berechneWerkstattSumme();
        aktualisierePositionen();

    });

    div.querySelector(".preis").addEventListener("input",function(){

        berechneWerkstattSumme();
        aktualisierePositionen();

    });

    div.querySelector(".modell")
        .addEventListener("input",aktualisierePositionen);

    div.querySelector(".notizen")
        .addEventListener("input",aktualisierePositionen);

    div.querySelectorAll(".arbeiten input")
        .forEach(cb=>{

            cb.addEventListener("change",aktualisierePositionen);

        });

    container.appendChild(div);

}

       
function addArtikel(){

    const container = document.getElementById("werkzeugContainer");

    const div = document.createElement("div");
    div.className = "geraet";

    // Menge
    const menge = document.createElement("input");
    menge.type = "number";
    menge.className = "menge";
    menge.value = 1;
    menge.min = 1;

    // Artikelauswahl
    const select = document.createElement("select");
    select.className = "artikelSelect";

    const leer = document.createElement("option");
    leer.value = "";
    leer.textContent = "Artikel wählen";
    select.appendChild(leer);

    // Artikelliste füllen
    for(const nr in artikelListe){

        const option = document.createElement("option");
        option.value = nr;
        option.textContent = nr + " – " + artikelListe[nr].name;

        select.appendChild(option);

    }

    // Beschreibung
    const beschreibung = document.createElement("input");
    beschreibung.className = "beschreibung";
    beschreibung.placeholder = "Beschreibung";

    // Preis
    const preis = document.createElement("input");
    preis.type = "number";
    preis.step = "0.01";
    preis.min = "0";
    preis.className = "preis";
    preis.placeholder = "Preis €";

    // Löschen
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = "removeBtn";
    btn.textContent = "Artikel löschen";

    // Auswahl geändert
    select.addEventListener("change",function(){

        const artikel = artikelListe[this.value];

        if(!artikel){
            beschreibung.value = "";
            preis.value = "";
        }else{
            beschreibung.value = artikel.name;
            preis.value = artikel.preis;
        }

        berechneWerkstattSumme();
        aktualisierePositionen();

    });

    // Änderungen
    [menge,beschreibung,preis].forEach(el=>{

        el.addEventListener("input",function(){

            berechneWerkstattSumme();
            aktualisierePositionen();

        });

    });

    // Löschen
    btn.addEventListener("click",function(){

        div.remove();

        berechneWerkstattSumme();
        aktualisierePositionen();

    });

    div.append(
        menge,
        select,
        beschreibung,
        preis,
        btn
    );

    container.appendChild(div);

}

function aktualisierePositionen(){

    const tabellen = [
        document.querySelector("#positionsTabelle tbody"),
        document.querySelector("#positionsTabelleRechnung tbody")
    ];

    tabellen.forEach(tbody=>tbody.innerHTML="");

    let pos = 1;

    // ---------------- Reparaturen ----------------

    document.querySelectorAll("#geraeteContainer .geraet").forEach(geraet=>{

        const modell = geraet.querySelector(".modell").value;
        const notizen = geraet.querySelector(".notizen").value;
        const preis = parseFloat(
            geraet.querySelector(".preis").value
        ) || 0;

        let arbeiten=[];

        geraet.querySelectorAll(".arbeiten input:checked")
        .forEach(cb=>arbeiten.push(cb.parentElement.innerText));

        if(modell==="" && preis===0) return;

        const html = `

<tr>

<td>${pos}</td>

<td>REPA</td>

<td>

<b>${modell}</b><br>

${arbeiten.join(", ")}

${notizen ? "<br><i>"+notizen+"</i>" : ""}

</td>

<td>1</td>

<td style="text-align:right">

${preis.toFixed(2).replace(".",",")} €

</td>

<td style="text-align:right">

${preis.toFixed(2).replace(".",",")} €

</td>

</tr>

`;

        tabellen.forEach(tbody=>tbody.insertAdjacentHTML("beforeend",html));

        pos++;

    });

    // ---------------- Artikel ----------------

    document.querySelectorAll("#werkzeugContainer .geraet").forEach(artikel=>{

        const nr = artikel.querySelector(".artikelSelect").value;
        const beschreibung = artikel.querySelector(".beschreibung").value;

        const menge = parseFloat(
            artikel.querySelector(".menge").value
        ) || 1;

        const preis = parseFloat(
            artikel.querySelector(".preis").value
        ) || 0;

        if(beschreibung==="" && preis===0) return;

        const gesamt = menge * preis;

        const html = `

<tr>

<td>${pos}</td>

<td>${nr}</td>

<td>${beschreibung}</td>

<td>${menge}</td>

<td style="text-align:right">

${preis.toFixed(2).replace(".",",")} €

</td>

<td style="text-align:right">

${gesamt.toFixed(2).replace(".",",")} €

</td>

</tr>

`;

        tabellen.forEach(tbody=>tbody.insertAdjacentHTML("beforeend",html));

        pos++;

    });

}


function berechneWerkstattSumme(){

    let summe = 0;

    // Reparaturen
    document.querySelectorAll("#geraeteContainer .geraet").forEach(geraet=>{

        const preis = parseFloat(
            geraet.querySelector(".preis").value
        );

        if(!isNaN(preis)){
            summe += preis;
        }

    });

    // Artikel
    document.querySelectorAll("#werkzeugContainer .geraet").forEach(artikel=>{

        const preis = parseFloat(
            artikel.querySelector(".preis").value
        ) || 0;

        const menge = parseFloat(
            artikel.querySelector(".menge").value
        ) || 1;

        summe += preis * menge;

    });

    document.getElementById("werkstattSumme").innerText =
        summe.toFixed(2).replace(".",",") + " €";

}

const titel={

    werkstatt:"Werkstattzettel",

    angebot:"Angebot",

    rechnung:"Rechnung",

    eigenbeleg:"Eigenbeleg"

};

function updateModus(){

    app.modus = document.getElementById("modus").value;

    document
    .querySelectorAll(".section")
    .forEach(sec=>sec.classList.remove("active"));

    // Eigenbeleg
    if(app.modus==="eigenbeleg"){

        document
        .getElementById("eigenbeleg")
        .classList.add("active");

    }

    // Werkstatt
    if(app.modus==="werkstatt"){

        document
        .getElementById("werkstatt")
        .classList.add("active");

    }

    // Angebot
    if(app.modus==="angebot"){

        document
        .getElementById("werkstatt")
        .classList.add("active");

        document
        .getElementById("angebot")
        .classList.add("active");

    }

    // Rechnung
    if(app.modus==="rechnung"){

        document
        .getElementById("werkstatt")
        .classList.add("active");

        document
        .getElementById("rechnung")
        .classList.add("active");

    }

    document.getElementById("title").innerText =
        titel[app.modus];
    aktualisierePositionen();

}

document
.getElementById("modus")
.addEventListener("change",updateModus);

document
.getElementById("resetBtn")
.addEventListener("click",()=>location.reload());

document
.getElementById("printBtn")
.addEventListener("click",drucken);


document
.getElementById("datum")
.value = new Date().toLocaleDateString("de-DE");
       
updateModus();
       
function drucken(){

    if(app.modus==="eigenbeleg"){

        druckeEigenbeleg();
        return;

    }

    druckeDokument();

}

function druckeDokument(){

    aktualisierePositionen();

    const istAngebot = app.modus === "angebot";

    const titel = istAngebot
        ? "Angebot"
        : "Rechnung";

    const quellTabelle = istAngebot
        ? document.querySelector("#positionsTabelle tbody")
        : document.querySelector("#positionsTabelleRechnung tbody");

    const fenster = window.open("", "_blank");

    fenster.document.write(`

<!DOCTYPE html>

<html lang="de">

<head>

<meta charset="UTF-8">

<title>${titel}</title>

<style>

body{

    font-family:Arial,Helvetica,sans-serif;
    margin:40px;
    font-size:13px;
    line-height:1.4;

}

.header{

    display:flex;
    justify-content:space-between;
    align-items:flex-start;
    margin-bottom:40px;

}

.logo{

    height:90px;

}

.kunde{

    margin-bottom:35px;
    line-height:1.35;

}

.kunde div{

    margin:2px 0;

}

table{

    width:100%;
    border-collapse:collapse;
    margin-top:25px;

}

th{

    border-bottom:2px solid black;
    text-align:left;
    padding:6px;

}

td{

    border-bottom:1px solid #ccc;
    padding:6px;

}

.rechts{

    text-align:right;

}

.summe{

    margin-top:20px;
    text-align:right;
    font-size:18px;
    font-weight:bold;

}

</style>

</head>

<body>

<div class="header">

<div>

<img src="logo.png" class="logo">

</div>

<div style="text-align:right;">

<h2 style="margin:0 0 15px 0;">${titel}</h2>

<div><b>${document.getElementById("datum").value}</b></div>

<div style="margin-top:6px;">
${document.getElementById("belegnummer").value}
</div>

</div>

<div style="font-size:10px;color:#666;margin-bottom:8px;">

MS Pens | Marco Schrage | Glindweg 13 | 22303 Hamburg | Deutschland

</div>

<div class="kunde">

<div>${document.getElementById("kundeName").value}</div>
<div>${document.getElementById("kundeStrasse").value}</div>
<div>${document.getElementById("kundeZusatz").value}</div>
<div>${document.getElementById("kundeOrt").value}</div>
<div>${document.getElementById("kundeRegion").value}</div>
<div>${document.getElementById("kundeLand").value}</div>

</div>

<table>

<thead>

<tr>

<th style="width:50px;">Pos.</th>
<th style="width:90px;">Art.-Nr.</th>
<th>Beschreibung</th>
<th style="width:70px;">Menge</th>
<th style="width:120px;" class="rechts">Einzelpreis</th>
<th style="width:120px;" class="rechts">Gesamt</th>

</tr>

</thead>

<tbody>

${quellTabelle.innerHTML}

</tbody>

</table>

<div class="summe">

Gesamt:
${document.getElementById("werkstattSumme").innerText}

</div>

</body>

</html>

`);

    fenster.document.close();

    fenster.onload = function(){

        fenster.focus();
        fenster.print();
        fenster.close();

    };

}
document
.getElementById("addGeraetBtn")
.addEventListener("click",addGeraet);

document
.getElementById("addArtikelBtn")
.addEventListener("click",addArtikel);

</script>

</body>
</html>
