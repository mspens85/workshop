<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Pens</title>

<style>
body {
  font-family: Arial;
  padding: 15px;
}

input, textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}

.geraet {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 15px;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
}

/* Checkbox sichtbar */
label {
  display: block;
  margin: 5px 0;
}
</style>

</head>

<body>

<h2 id="title">Werkstattzettel</h2>

<label>
  <input type="checkbox" id="angebotToggle" onchange="toggleAngebot()">
  Angebotsmodus
</label>

<h3>Kunde</h3>
<input id="name" placeholder="Name">
<input id="datum" placeholder="Datum">

<h3>Geräte</h3>
<div id="container"></div>

<button onclick="addGeraet()">+ Gerät hinzufügen</button>

<div id="gesamtBlock" style="display:none;">
  <h3>Gesamtpreis</h3>
  <input id="gesamtpreis" readonly>
</div>

<button onclick="drucken()">Drucken</button>

<script>

// Gerät hinzufügen
function addGeraet() {

  let div = document.createElement("div");
  div.className = "geraet";

  div.innerHTML = `
    <input class="modell" placeholder="Modell">

    <label><input type="checkbox"> Demontage</label>
    <label><input type="checkbox"> Reinigung</label>
    <label><input type="checkbox"> Politur</label>

    <input class="preis" placeholder="Preis" oninput="summe()">
  `;

  document.getElementById("container").appendChild(div);
}

// Summe
function summe() {
  let total = 0;

  document.querySelectorAll(".preis").forEach(el => {
    let v = parseFloat(el.value.replace(",", "."));
    if (!isNaN(v)) total += v;
  });

  document.getElementById("gesamtpreis").value = total.toFixed(2);
}

// Angebotsmodus
function toggleAngebot() {
  let aktiv = document.getElementById("angebotToggle").checked;

  document.getElementById("title").innerText = aktiv ? "Angebot" : "Werkstattzettel";
  document.getElementById("gesamtBlock").style.display = aktiv ? "block" : "none";
}

// Drucken
function drucken() {
  window.print();
}

// Start
addGeraet();

</script>

</body>
</html>
