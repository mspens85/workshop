<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Pens</title>

<style>
body { font-family: Arial; padding: 15px; }

input:not([type="checkbox"]),
textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}

textarea {
  min-height: 60px;
  height: auto;
  resize: none;
}

.geraet, .tool {
  border: 1px solid #aaa;
  padding: 10px;
  margin-top: 12px;
  border-radius: 8px;
}

.tool-grid {
  display: grid;
  grid-template-columns: 60px 140px 1fr 100px;
  gap: 6px;
}

label {
  display: grid;
  grid-template-columns: auto 1fr;
  gap: 6px;
}

button {
  width: 50%;
  padding: 12px;
  margin-top: 10px;
}

.arbeiten {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
}

.kunde {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

#positionsliste {
  font-size: 12px;
}

.position {
  display: flex;
  justify-content: space-between;
  border-bottom: 1px solid #ccc;
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.logo { height: 50px; }

@media print {
  input[type="checkbox"], button, .toggle { display: none; }

  .kunde { display: block !important; }

  textarea {
    height: auto !important;
    min-height: 0 !important;
    padding: 0 !important;
    margin: 0 !important;
    font-style: italic;
  }

  .geraet, .tool {
    border: 1px solid #000;
    padding: 4px;
  }

  .header {
    border-bottom: 1px solid #000;
  }

  .logo { height: 40px; }
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <h2 id="title">Werkstattzettel</h2>
</div>

<div class="toggle">
  <label>
    <input type="checkbox" id="angebotToggle">
    Angebotsmodus
  </label>
</div>

<h3>Kundendaten</h3>
<div class="kunde">
  <input id="name" placeholder="Name">
  <input id="strasse" placeholder="Straße">
  <input id="strasse2" placeholder="Straße 2">
  <input id="plzort" placeholder="PLZ / Ort">
  <input id="land" placeholder="Land">
  <input id="extra" placeholder="Zusätzliches">
  <input id="datum" placeholder="Datum">
</div>

<h3>Geräte</h3>
<div id="container"></div>
<button id="addBtn">+ Gerät hinzufügen</button>

<h3 id="toolsTitel" style="display:none;">Werkzeuge</h3>
<div id="toolsContainer"></div>
<button id="addToolBtn" style="display:none;">+ Werkzeug hinzufügen</button>

<h3 id="positionsTitel" style="display:none;">Positionen</h3>
<div id="positionsliste" style="display:none;"></div>

<div id="gesamtBlock" style="display:none;">
  <h3>Gesamtpreis</h3>
  <input id="gesamtpreis" readonly>
</div>

<button id="printBtn">📄 Drucken / PDF</button>

<script>

// Artikel
const artikelListe = {
  "CORK2": { name: "Dichtkorken Größe 2", preis: 20 },
  "CORK4": { name: "Dichtkorken Größe 4", preis: 20 },
  "CORK6": { name: "Dichtkorken Größe 6", preis: 20 },
  "CORK9": { name: "Dichtkorken Größe 9", preis: 20 },
  "PTM": { name: "Kolbeneinheit Werkzeug modern", preis: 39 },
  "PTA": { name: "Kolbeneinheit Werkzeug antik", preis: 39 },
  "SHIP1": { name: "Versandkosten", preis: 3.99 },
  "NTM6": { name: "Federeinheit Werkzeug modern 6", preis: 60 },
  "NTM9": { name: "Federeinheit Werkzeug modern 9", preis: 60 },
  "NTA2": { name: "Federeinheit Werkzeug antik 2", preis: 60 },
  "NTA4": { name: "Federeinheit Werkzeug antik 4", preis: 60 },
  "NTA6": { name: "Federeinheit Werkzeug antik 6", preis: 60 },
  "NTA9": { name: "Federeinheit Werkzeug antik 9", preis: 60 },
  "CORKTOOL": { name: "Korkmutter Werkzeug", preis: 60 },
  "CORKPUSH": { name: "Eindrückhilfe", preis: 60 },
  "CORKNUT": { name: "Hartgummimutter", preis: 25 },
  "GREASE": { name: "Schmierfett", preis: 4.5 },
  "SEALING": { name: "Dichtwachs", preis: 4.5 },
  "KOB": { name: "Knockout-Block", preis: 60 },
  "SHIP2": { name: "Versandkosten", preis: 5.49 }
};

// Geräte
function createGeraet() {
  const div = document.createElement("div");
  div.className = "geraet";

  const modell = document.createElement("input");
  modell.placeholder = "Modell";

  const notizen = document.createElement("textarea");
  notizen.placeholder = "Notizen";
  notizen.addEventListener("input", function () {
    this.style.height = "auto";
    this.style.height = this.scrollHeight + "px";
  });

  const arbeitenDiv = document.createElement("div");
  arbeitenDiv.className = "arbeiten";

  ["Reinigung","Politur","Kork erneuern"].forEach(t => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";
    label.appendChild(cb);
    label.appendChild(document.createTextNode(" " + t));
    arbeitenDiv.appendChild(label);
  });

  const preis = document.createElement("input");
  preis.placeholder = "Einzelpreis €";
  preis.className = "preis";
  preis.addEventListener("input", updateSumme);

  div.append(modell, notizen, arbeitenDiv, preis);
  return div;
}

// Werkzeuge
function createTool() {
  const div = document.createElement("div");
  div.className = "tool";

  const grid = document.createElement("div");
  grid.className = "tool-grid";

  const menge = document.createElement("input");
  menge.placeholder = "Menge";

  const artikel = document.createElement("select");
  const empty = document.createElement("option");
  empty.textContent = "Artikel wählen";
  artikel.appendChild(empty);

  for (let key in artikelListe) {
    const o = document.createElement("option");
    o.value = key;
    o.textContent = key + " – " + artikelListe[key].name;
    artikel.appendChild(o);
  }

  const beschreibung = document.createElement("input");
  const preis = document.createElement("input");
  preis.className = "preis";

  artikel.addEventListener("change", function () {
    const data = artikelListe[this.value];
    if (data) {
      beschreibung.value = data.name;
      preis.value = data.preis.toString().replace(".", ",");
      updateSumme();
    }
  });

  preis.addEventListener("input", updateSumme);
  menge.addEventListener("input", updateSumme);

  grid.append(menge, artikel, beschreibung, preis);
  div.appendChild(grid);
  return div;
}

// Summe
function updateSumme() {
  let sum = 0;

  document.querySelectorAll(".preis").forEach(el => {
    let v = parseFloat(el.value.replace(",", "."));
    let menge = 1;

    const tool = el.closest(".tool");
    if (tool) {
      const m = tool.querySelector("input");
      let mv = parseFloat(m.value);
      if (!isNaN(mv)) menge = mv;
    }

    if (!isNaN(v)) sum += v * menge;
  });

  document.getElementById("gesamtpreis").value =
    sum.toFixed(2).replace(".", ",") + " €";
}

// UI
function toggleAngebot() {
  const aktiv = angebotToggle.checked;

  title.innerText = aktiv ? "Angebot" : "Werkstattzettel";
  gesamtBlock.style.display = aktiv ? "block" : "none";
  toolsTitel.style.display = aktiv ? "block" : "none";
  addToolBtn.style.display = aktiv ? "block" : "none";
}

// Events
addBtn.onclick = () => container.appendChild(createGeraet());
addToolBtn.onclick = () => toolsContainer.appendChild(createTool());
printBtn.onclick = () => window.print();
angebotToggle.onchange = toggleAngebot;

// Start
addBtn.click();

</script>

</body>
</html>
