<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MS Pens">

<link rel="apple-touch-icon" href="MSPENS.png">

<title>MS Pens</title>

<style>
body {
  font-family: -apple-system, Arial;
  margin: 0;
  padding: 15px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header img {
  width: 60px;
}

.section {
  margin-top: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  height: 120px;
}

/* ✅ Custom Checkbox */
.checkbox {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 8px 0;
  cursor: pointer;
}

.checkbox input {
  display: none;
}

.checkmark {
  width: 22px;
  height: 22px;
  border: 2px solid black;
  border-radius: 4px;
  display: inline-block;
  position: relative;
}

.checkbox input:checked + .checkmark {
  background: black;
}

.checkbox input:checked + .checkmark::after {
  content: "✓";
  color: white;
  position: absolute;
  top: -2px;
  left: 4px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}

.print { background: #007AFF; color: white; }
.reset { background: #ccc; }

.geraetBlock {
  border: 1px solid #ccc;
  padding: 10px;
  margin-top: 15px;
  border-radius: 10px;
}

@media print {
  button, .toggle { display: none; }
}
</style>

</head>

<body>

<div class="header">
  <img src="MSPENS.png">
  <h2 id="title">Werkstattzettel</h2>
</div>

<div class="toggle">
  <label class="checkbox">
    <input type="checkbox" id="angebotToggle" onchange="toggleAngebot()">
    <span class="checkmark"></span>
    Angebotsmodus
  </label>
</div>

<div class="section">
  <h3>Kundendaten</h3>
  <input id="name" placeholder="Name">
  <input id="datum" placeholder="Datum">
</div>

<!-- Geräte -->

<div class="section">
  <h3>Schreibgeräte</h3>
  <div id="geraeteContainer"></div>
  <button onclick="addGeraet()">+ Gerät hinzufügen</button>
</div>

<!-- Gesamtpreis -->

<div class="section" id="gesamtBlock" style="display:none;">
  <h3>Gesamtpreis</h3>
  <input id="gesamtpreis" readonly>
</div>

<button class="print" onclick="drucken()">📄 Drucken / PDF</button> <button class="reset" onclick="resetForm()">🔄 Zurücksetzen</button>

<script>

let geraetCounter = 0;

function addGeraet() {
  geraetCounter++;

  let div = document.createElement("div");
  div.className = "geraetBlock";

  div.innerHTML = `
    <h4>Gerät ${geraetCounter}</h4>

    <input placeholder="Modell">

    <textarea placeholder="Notizen"></textarea>

```
<div>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Demontage</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Reinigung</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Wartung Mechanik</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Korkdichtung erneuern</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Politur einfach</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Mehrstufige Handpolitur</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Gravur entfernen</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Kappenriss schließen</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Kappenlippe erneuern</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Clip/Kappenringe vergolden</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Kappenstern erneuert</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Feder umschleifen</label>
  <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Schreibprobe</label>
</div>

<input class="preisInput" placeholder="Einzelpreis €" oninput="updateSumme()">
```

`;

document.getElementById("geraeteContainer").appendChild(div);
}

function updateSumme() {
let summe = 0;

document.querySelectorAll(".preisInput").forEach(input => {
let val = parseFloat(input.value.replace(",", "."));
if (!isNaN(val)) summe += val;
});

document.getElementById("gesamtpreis").value = summe.toFixed(2) + " €";
}

function toggleAngebot() {
let aktiv = document.getElementById("angebotToggle").checked;

document.getElementById("title").innerText = aktiv ? "Angebot" : "Werkstattzettel";
document.getElementById("gesamtBlock").style.display = aktiv ? "block" : "none";
}

function drucken() {

document.querySelectorAll("label.checkbox").forEach(el => {
let input = el.querySelector("input");
if (!input.checked) el.style.display = "none";
});

window.print();
setTimeout(() => location.reload(), 500);
}

function resetForm() {
location.reload();
}

// Start mit 1 Gerät
addGeraet();

</script>

</body>
</html>
