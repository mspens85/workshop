<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Pens Office</title>

<style>

*{
    box-sizing:border-box;
    font-family:Arial,Helvetica,sans-serif;
}

body{
    margin:0;
    background:#f3f3f3;
    padding:20px;
}

.wrapper{

    max-width:1100px;
    margin:auto;

    background:white;

    border-radius:12px;

    box-shadow:0 5px 20px rgba(0,0,0,.15);

    padding:30px;

}

.header{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:30px;

}

.logo{

    height:90px;

}

h1{

    margin:0;

}

.toolbar{

    display:flex;

    gap:10px;

    margin-bottom:30px;

}

select,
button,
input,
textarea{

    width:100%;

    padding:8px;

    border-radius:8px;

    border:1px solid #bbb;

    font-size:14px;

}

button{

    cursor:pointer;

}

.section{

    display:none;

}

.section.active{

    display:block;

}

.buttons{

    display:flex;

    gap:10px;

    margin-top:40px;

}
    
.kundeGrid{

    display:grid;

    grid-template-columns:2fr 1fr;

    gap:25px;

}

.kundeGrid input{

    margin-bottom:8px;

}

.briefkopf{

    font-size:10px;

    color:#666;

    margin-bottom:8px;

}

#datum,
#belegnummer{

    text-align:right;

}

</style>

</head>

<body>

<div class="wrapper">

<div class="header">

<div>

<img src="logo.png" class="logo">

</div>

<div>

<h1 id="title">Werkstattzettel</h1>

</div>

</div>

<div class="toolbar">

<select id="modus">

<option value="werkstatt">Werkstattzettel</option>

<option value="angebot">Angebot</option>

<option value="rechnung">Rechnung</option>

<option value="eigenbeleg">Eigenbeleg</option>

</select>

<select id="sprache">

<option value="de">Deutsch</option>

<option value="en">English</option>

</select>

</div>

<!-- Werkstatt -->
<div id="werkstatt" class="section active">

    <h2>Kundendaten</h2>

    <div class="kundeGrid">

        <div>

            <div class="briefkopf">
                MS Pens | Marco Schrage | Glindweg 13 | 22303 Hamburg
            </div>

            <input id="kundeName" placeholder="Name">

            <input id="kundeStrasse" placeholder="Straße">

            <input id="kundeZusatz" placeholder="Adresszusatz">

            <input id="kundeOrt" placeholder="PLZ / Ort">

            <input id="kundeRegion" placeholder="Bundesland / Region">

            <input id="kundeLand" placeholder="Land">

        </div>

        <div>

            <input id="datum">

            <input id="belegnummer" placeholder="Werkstattnummer">

        </div>

    </div>

    <h2 style="margin-top:35px;">Geräte</h2>

    <div id="geraeteContainer">

    </div>

    <button id="addGeraetBtn">
        + Gerät hinzufügen
    </button>

</div>

<!-- Angebot -->

<div id="angebot" class="section">

<h2>Angebot</h2>

<p>Angebotsbereich folgt…</p>

</div>

<!-- Rechnung -->

<div id="rechnung" class="section">

<h2>Rechnung</h2>

<p>Rechnungsbereich folgt…</p>

</div>

<!-- Eigenbeleg -->

<div id="eigenbeleg" class="section">

<h2>Eigenbeleg</h2>

<p>Eigenbelegbereich folgt…</p>

</div>

<div class="buttons">

<button id="printBtn">

📄 Drucken

</button>

<button id="resetBtn">

🔄 Reset

</button>

</div>

</div>

   <script>

const app={

    modus:"werkstatt",

    sprache:"de"

};

const titel={

    werkstatt:"Werkstattzettel",

    angebot:"Angebot",

    rechnung:"Rechnung",

    eigenbeleg:"Eigenbeleg"

};

function updateModus(){

    app.modus=document.getElementById("modus").value;

    document
    .querySelectorAll(".section")
    .forEach(sec=>sec.classList.remove("active"));

    document
    .getElementById(app.modus)
    .classList.add("active");

    document
    .getElementById("title")
    .innerText=titel[app.modus];

}

document
.getElementById("modus")
.addEventListener("change",updateModus);

document
.getElementById("resetBtn")
.addEventListener("click",()=>location.reload());

document
.getElementById("printBtn")
.addEventListener("click",()=>window.print());


document
.getElementById("datum")
.value = new Date().toLocaleDateString("de-DE");
       
updateModus();

</script>

</body>
</html>
