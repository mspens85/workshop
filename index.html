<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="MS Pens">

<link rel="apple-touch-icon" href="MSPENS.png">

<title>MS Pens</title>

<style>
body {
  font-family: -apple-system, Arial;
  margin: 0;
  padding: 15px;
}

.header {
  display: flex;
  align-items: center;
  gap: 15px;
}

.header img {
  width: 60px;
}

.section {
  margin-top: 20px;
}

input, textarea {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea {
  height: 140px;
}

/* 🔥 Custom Checkbox (iPad fix) */
.checkbox {
  display: flex;
  align-items: center;
  gap: 12px;
  margin: 10px 0;
  cursor: pointer;
}

.checkbox input {
  display: none;
}

.checkmark {
  width: 22px;
  height: 22px;
  border: 2px solid black;
  border-radius: 4px;
  display: inline-block;
  position: relative;
}

.checkbox input:checked + .checkmark {
  background: black;
}

.checkbox input:checked + .checkmark::after {
  content: "✓";
  color: white;
  position: absolute;
  top: -2px;
  left: 4px;
  font-size: 16px;
}

button {
  width: 100%;
  padding: 15px;
  margin-top: 15px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}

.print { background: #007AFF; color: white; }
.reset { background: #ccc; }

@media print {
  button, .toggle { display: none; }
}
</style>

</head>

<body>

<div class="header">
  <img src="MSPENS.png">
  <h2 id="title">Werkstattzettel</h2>
</div>

<div class="toggle">
  <label class="checkbox">
    <input type="checkbox" id="angebotToggle" onchange="toggleAngebot()">
    <span class="checkmark"></span>
    Angebotsmodus
  </label>
</div>

<div class="section">
  <h3>Kundendaten</h3>
  <input id="name" placeholder="Name">
  <input id="strasse" placeholder="Straße">
  <input id="strasse2" placeholder="Straße 2">
  <input id="plzort" placeholder="PLZ / Ort">
  <input id="land" placeholder="Land">
  <input id="zusatz" placeholder="Zusätzliche Angaben">
  <input id="datum" placeholder="Datum">
</div>

<div class="section">
  <h3>Gerät</h3>
  <input id="modell" placeholder="Modell">
  <textarea id="notizen" placeholder="Notizen"></textarea>
</div>

<div class="section" id="arbeiten">
  <h3>Arbeiten</h3>

<label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Demontage</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Reinigung</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Wartung Mechanik</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Korkdichtung erneuern</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Politur einfach</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Mehrstufige Handpolitur</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Gravur entfernen</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Kappenriss schließen</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Kappenlippe erneuern</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Clip/Kappenringe vergolden</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Kappenstern erneuert</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Feder umschleifen</label> <label class="checkbox"><input type="checkbox"><span class="checkmark"></span>Schreibprobe</label>

</div>

<div id="preisBlock" style="display:none;">
  <h3>Gesamtpreis</h3>
  <input id="gesamtpreis" placeholder="z. B. 180€">
</div>

<button class="print" onclick="drucken()">📄 Drucken / PDF</button> <button class="reset" onclick="resetForm()">🔄 Zurücksetzen</button>

<script>

const fields = ["name","strasse","strasse2","plzort","land","zusatz","datum","modell","notizen","gesamtpreis"];

// 💾 Daten laden
window.onload = function() {
  fields.forEach(id => {
    let val = localStorage.getItem(id);
    if (val) document.getElementById(id).value = val;
  });
};

// 💾 speichern
document.addEventListener("input", e => {
  if (fields.includes(e.target.id)) {
    localStorage.setItem(e.target.id, e.target.value);
  }
});

// Angebotsmodus
function toggleAngebot() {
  let aktiv = document.getElementById("angebotToggle").checked;
  document.getElementById("title").innerText = aktiv ? "Angebot" : "Werkstattzettel";
  document.getElementById("preisBlock").style.display = aktiv ? "block" : "none";
}

// Drucken
function drucken() {

// Arbeiten filtern
document.querySelectorAll("#arbeiten label").forEach(el => {
if (!el.querySelector("input").checked) {
el.style.display = "none";
}
});

// Leere Felder ausblenden
fields.forEach(id => {
let el = document.getElementById(id);
if (!el.value) el.style.display = "none";
});

// 🔥 Dateiname bauen
let name = document.getElementById("name").value || "Kunde";
let modell = document.getElementById("modell").value || "Füller";
let typ = document.getElementById("angebotToggle").checked ? "Angebot" : "Werkstatt";

// Datum automatisch (falls leer)
let datumInput = document.getElementById("datum").value;
let datum = datumInput ? datumInput : new Date().toISOString().split("T")[0];

// Sonderzeichen entfernen (wichtig!)
name = name.replace(/[^a-zA-Z0-9]/g, "");
modell = modell.replace(/[^a-zA-Z0-9]/g, "");

let filename = datum + "" + name + "" + modell + "_" + typ;

document.title = filename;

// Drucken
window.print();

setTimeout(() => location.reload(), 500);
}

// Reset
function resetForm() {
  localStorage.clear();
  location.reload();
}

</script>

</body>
</html>
