<!DOCTYPE html>

<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MS Pens</title>

<style>
body {
  font-family: -apple-system, Arial;
  padding: 15px;
}

/* Header */
.header {
  display: flex;
  align-items: center;
  gap: 15px;
}
.header img { width: 60px; }

/* Felder */
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 6px 0;
  font-size: 16px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

textarea { height: 140px; }

/* Geräte */
.geraetBlock {
  border: 1px solid #ccc;
  padding: 12px;
  margin-top: 15px;
  border-radius: 10px;
}

/* ✅ robuste Checkbox (iPad sicher) */
.checkbox {
  display: block;
  margin: 6px 0;
  font-size: 16px;
}

.checkbox input {
  margin-right: 10px;
  transform: scale(1.3);
}

/* Buttons */
button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  font-size: 16px;
  border-radius: 10px;
  border: none;
}

.print { background: #007AFF; color: white; }
.reset { background: #ccc; }

/* Druck */
@media print {
  button, .toggle { display: none; }
}
</style>

</head>

<body>

<div class="header">
  <img src="MSPENS.png">
  <h2 id="title">Werkstattzettel</h2>
</div>

<!-- Angebotsmodus -->

<div class="toggle">
  <label class="checkbox">
    <input type="checkbox" id="angebotToggle" onchange="toggleAngebot()">
    Angebotsmodus
  </label>
</div>

<!-- Kundendaten -->

<h3>Kundendaten</h3>
<input id="name" placeholder="Name">
<input id="strasse" placeholder="Straße">
<input id="strasse2" placeholder="Straße 2">
<input id="plzort" placeholder="PLZ / Ort">
<input id="land" placeholder="Land">
<input id="extra" placeholder="Zusätzliches">
<input id="datum" placeholder="Datum">

<!-- Geräte -->

<h3>Schreibgeräte</h3>
<div id="geraeteContainer"></div>
<button onclick="addGeraet()">+ Gerät hinzufügen</button>

<!-- Gesamtpreis -->

<div id="gesamtBlock" style="display:none;">
  <h3>Gesamtpreis</h3>
  <input id="gesamtpreis" readonly>
</div>

<button class="print" onclick="drucken()">📄 Drucken / PDF</button> <button class="reset" onclick="resetForm()">🔄 Zurücksetzen</button>

<script>

let geraetCounter = 0;

function addGeraet() {
  geraetCounter++;

  let div = document.createElement("div");
  div.className = "geraetBlock";

  div.innerHTML = `
    <h4>Gerät ${geraetCounter}</h4>

    <input class="modell" placeholder="Modell">

    <textarea placeholder="Notizen"></textarea>

```
<div class="arbeiten">
  <label class="checkbox"><input type="checkbox">Demontage</label>
  <label class="checkbox"><input type="checkbox">Reinigung</label>
  <label class="checkbox"><input type="checkbox">Wartung Mechanik</label>
  <label class="checkbox"><input type="checkbox">Korkdichtung erneuern</label>
  <label class="checkbox"><input type="checkbox">Politur einfach</label>
  <label class="checkbox"><input type="checkbox">Mehrstufige Handpolitur</label>
  <label class="checkbox"><input type="checkbox">Gravur entfernen</label>
  <label class="checkbox"><input type="checkbox">Kappenriss schließen</label>
  <label class="checkbox"><input type="checkbox">Kappenlippe erneuern</label>
  <label class="checkbox"><input type="checkbox">Clip/Kappenringe vergolden</label>
  <label class="checkbox"><input type="checkbox">Kappenstern erneuert</label>
  <label class="checkbox"><input type="checkbox">Feder umschleifen</label>
  <label class="checkbox"><input type="checkbox">Schreibprobe</label>
</div>

<input class="preisInput" placeholder="Einzelpreis €" oninput="updateSumme()">
```

`;

document.getElementById("geraeteContainer").appendChild(div);
}

function updateSumme() {
let summe = 0;

document.querySelectorAll(".preisInput").forEach(input => {
let val = parseFloat(input.value.replace(",", "."));
if (!isNaN(val)) summe += val;
});

document.getElementById("gesamtpreis").value = summe.toFixed(2) + " €";
}

function toggleAngebot() {
let aktiv = document.getElementById("angebotToggle").checked;

document.getElementById("title").innerText = aktiv ? "Angebot" : "Werkstattzettel";
document.getElementById("gesamtBlock").style.display = aktiv ? "block" : "none";
}

function drucken() {

// nur angehakte Arbeiten anzeigen
document.querySelectorAll(".arbeiten label").forEach(label => {
let cb = label.querySelector("input");
if (!cb.checked) label.style.display = "none";
});

// leere Felder ausblenden
document.querySelectorAll("input, textarea").forEach(el => {
if (!el.value) el.style.display = "none";
});

// Dateiname setzen
let name = document.getElementById("name").value || "Kunde";
let modell = document.querySelector(".modell")?.value || "Füller";
let datum = document.getElementById("datum").value || new Date().toISOString().split("T")[0];

document.title = datum + "*" + name + "*" + modell;

window.print();
setTimeout(() => location.reload(), 500);
}

function resetForm() {
location.reload();
}

// Startgerät
addGeraet();

</script>

</body>
</html>
