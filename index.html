<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MS Pens</title>

<style>
body { font-family: Arial; padding: 15px; }

input:not([type="checkbox"]),
textarea {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  font-size: 16px;
}

textarea {
  min-height: 60px;
  height: auto;
  resize: none;
}
.geraet {
  border: 1px solid #aaa;
  padding: 10px;
  margin-top: 12px;
  border-radius: 8px;
}

label {
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: start;
  gap: 6px;
  margin: 2px 0;
}

button {
  width: 50%;
  padding: 12px;
  margin-top: 10px;
  font-size: 16px;
}

.arbeiten {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  column-gap: 20px;
}

* { box-sizing: border-box; }

input, textarea {
  width: 100%;
  padding: 8px;
  margin: 4px 0;
  font-size: 14px;
  border-radius: 6px;
  border: 1px solid #bbb;
}

label input { flex-shrink: 0; }

.kunde {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 8px;
}

#positionsliste {
  margin-top: 10px;
  font-size: 12px;
}

.position {
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  border-bottom: 1px solid #ccc;
  padding: 2px 0;
  gap: 10px;
}

.position div:last-child {
  white-space: nowrap;
  text-align: right;
  min-width: 80px;
}
  
  .header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 10px;
}

.logo {
  height: 50px;
  object-fit: contain;
}

.header-text {
  text-align: right;
}

@media print {

  @page {
    size: A4;
    margin: 12mm;
  }

  body {
    font-size: 11px;
    line-height: 1.3;
    padding: 0;
  }

  h2 {
    font-size: 16px;
    margin-bottom: 5px;
  }

  h3 {
    font-size: 13px;
    margin: 6px 0 3px 0;
    border-bottom: 1px solid #000;
  }

  .geraet {
    border: 1px solid #000;
    padding: 4px;
    margin-top: 8px;
    page-break-inside: avoid;
  }
  
  .geraet > * {
  margin-bottom: 2px;
}

  input[type="checkbox"] {
    display: none;
  }

  label { margin: 1px 0; }

  label::before {
    content: "– ";
  }

  .toggle { display: none; }

  input, textarea {
    border: none;
    padding: 1px;
    margin: 1px 0;
    font-size: 11px;
  }

textarea {
  height: auto !important;
  min-height: 0 !important;
  padding: 0 !important;
  margin: 0 !important;
  line-height: 1.2;
  overflow: hidden;
  font-style: italic;
  margin-bottom: 2px;

}
  
  button { display: none; }

  .kunde { display: block !important; }

  .kunde input {
    display: block;
    width: 100%;
    border: none;
    padding: 0;
    margin: 0;
    font-size: 11px;
    line-height: 1.2;
  }

.geraet input,
.geraet textarea {
  margin: 0;
  padding: 0;
  }
  .arbeiten {
  margin-top: 2px;
}

label {
  margin: 0;
  }

  .header {
  border-bottom: 1px solid #000;
  padding-bottom: 5px;
  margin-bottom: 10px;
}

.logo {
  height: 40px;
}

  #addBtn,
#addToolBtn,
#printBtn {
  display: none !important;
}

  select {
  display: none !important;
}
#toolsTable {
  display: table !important;
  margin-top: 10px;
}

#toolsTable th,
#toolsTable td {
  border-bottom: 1px solid #000;
  padding: 3px;
}

#toolsTable th {
  text-align: left;
}

#toolsTable td:last-child,
#toolsTable th:last-child {
  text-align: right;
  white-space: nowrap;
}
  
  
}
</style>
</head>

<body>

<div class="header">
  <img src="logo.png" class="logo">
  <div class="header-text">
    <h2 id="title">Werkstattzettel</h2>
  </div>
</div>

<div class="toggle">
  <label>
    <input type="checkbox" id="angebotToggle">
    Angebotsmodus
  </label>
</div>

<h3>Kundendaten</h3>

<div class="kunde">
  <input id="name" placeholder="Name">
  <input id="strasse" placeholder="Straße">
  <input id="strasse2" placeholder="Straße 2">
  <input id="plzort" placeholder="PLZ / Ort">
  <input id="land" placeholder="Land">
  <input id="extra" placeholder="Zusätzliches">
  <input id="datum" placeholder="Datum">
</div>

<h3 id="geraeteTitel">Geräte</h3>
<div id="container"></div>

  <h3 id="toolsTitel" style="display:none;">Werkzeuge</h3>
<div id="toolsContainer"></div>
<button id="addToolBtn" style="display:none;">+ Werkzeug hinzufügen</button>

<button id="addBtn">+ Gerät hinzufügen</button>

<!-- Positionsliste -->
<h3 id="positionsTitel" style="display:none;">Positionen</h3>
<div id="positionsliste" style="display:none;"></div>

<h3 id="toolsTableTitle" style="display:none;">Werkzeuge</h3>

<table id="toolsTable" style="display:none; width:100%; border-collapse: collapse; font-size:12px;">
  <thead>
    <tr>
      <th>Pos</th>
      <th>Art.-Nr</th>
      <th>Beschreibung</th>
      <th>Menge</th>
      <th>Einzelpreis</th>
      <th>Gesamt</th>
    </tr>
  </thead>
  <tbody></tbody>
</table>

  
<div id="gesamtBlock" style="display:none;">
  <h3>Gesamtpreis</h3>
  <input id="gesamtpreis" readonly>
</div>

<button id="printBtn">📄 Drucken / PDF</button>
<button onclick="location.reload()">🔄 Zurücksetzen</button>




  

<script>
  
const artikelListe = {
  "CORK2": { name: "Dichtkorken Größe 2", preis: 20 },
  "CORK4": { name: "Dichtkorken Größe 4", preis: 20 },
  "CORK6": { name: "Dichtkorken Größe 6", preis: 20 },
  "CORK9": { name: "Dichtkorken Größe 9", preis: 20 },
  "PTM": { name: "Werkzeug für die Kolbeneinheit modern", preis: 39 },
  "PTA": { name: "Werkzeug für die Kolbeneinheit antik", preis: 39 },
  "SHIP1": { name: "Versandkosten", preis: 3.99 },
  "NTM6": { name: "Federeinheit Werkzeug modern Größe 6", preis: 60 },
  "NTM9": { name: "Federeinheit Werkzeug modern Größe 9", preis: 60 },
  "NTA2": { name: "Federeinheit Werkzeug antik Größe 2", preis: 60 },
  "NTA4": { name: "Federeinheit Werkzeug antik Größe 4", preis: 60 },
  "NTA6": { name: "Federeinheit Werkzeug antik Größe 6", preis: 60 },
  "NTA9": { name: "Federeinheit Werkzeug antik Größe 9", preis: 60 },
  "CORKTOOL": { name: "Werkzeug Korkmutter", preis: 60 },
  "CORKPUSH": { name: "Eindrückhilfe Dichtkorken", preis: 60 },
  "CORKNUT": { name: "Hartgummimutter", preis: 25 },
  "GREASE": { name: "Schmierfett", preis: 4.5 },
  "SEALING": { name: "Dichtwachs", preis: 4.5 },
  "KOB": { name: "Knockout-Block", preis: 60 },
  "SHIP2": { name: "Versandkosten", preis: 5.49 }
};
function createTool() {
  const div = document.createElement("div");
  div.className = "geraet";

  // Menge
  const menge = document.createElement("input");
  menge.className = "tool-menge";
  menge.placeholder = "Menge";
  menge.type = "number";
  menge.value = "1";

  // Dropdown
  const artikel = document.createElement("select");

  const empty = document.createElement("option");
  empty.textContent = "Artikel wählen";
  empty.value = "";
  artikel.appendChild(empty);

  for (let key in artikelListe) {
    const opt = document.createElement("option");
    opt.value = key;
    opt.textContent = key + " – " + artikelListe[key].name;
    artikel.appendChild(opt);
  }

  // Beschreibung
  const beschreibung = document.createElement("input");
  beschreibung.className = "tool-beschreibung";
  beschreibung.placeholder = "Beschreibung";

  // Preis
  const preis = document.createElement("input");
  preis.placeholder = "Preis €";
  preis.className = "preis";

  // 👉 Automatik beim Auswählen
  artikel.addEventListener("change", function () {
    const data = artikelListe[this.value];
    if (data) {
      beschreibung.value = data.name;
      preis.value = data.preis.toString().replace(".", ",");
      updateSumme();
    }
  });

  // 👉 Summe aktualisieren
  preis.addEventListener("input", updateSumme);
  menge.addEventListener("input", updateSumme);

  div.appendChild(menge);
  div.appendChild(artikel);
  div.appendChild(beschreibung);
  div.appendChild(preis);

  return div;
}

document.getElementById("addToolBtn").onclick = () => {
  document.getElementById("toolsContainer").appendChild(createTool());
};
  
function createGeraet() {
  const div = document.createElement("div");
  div.className = "geraet";

  const modell = document.createElement("input");
modell.placeholder = "Modell";

const notizen = document.createElement("textarea");
notizen.placeholder = "Notizen";

notizen.addEventListener("input", function () {
  this.style.height = "auto";
  this.style.height = (this.scrollHeight + 2) + "px";
});
  
  const arbeiten = [
    "Demontage","Reinigung","Wartung Mechanik","Korkdichtung erneuern",
    "Politur einfach","Mehrstufige Handpolitur","Gravur entfernen",
    "Kappenriss schließen","Kappenlippe erneuern",
    "Clip/Kappenringe vergolden","Kappenstern erneuert",
    "Feder umschleifen","Schreibprobe"
  ];

  const arbeitenDiv = document.createElement("div");
  arbeitenDiv.className = "arbeiten";

  arbeiten.forEach(text => {
    const label = document.createElement("label");
    const cb = document.createElement("input");
    cb.type = "checkbox";

    label.appendChild(cb);
    label.appendChild(document.createTextNode(" " + text));

    arbeitenDiv.appendChild(label);
  });

  const preis = document.createElement("input");
  preis.placeholder = "Einzelpreis €";
  preis.className = "preis";

  preis.addEventListener("input", updateSumme);

  div.appendChild(modell);
  div.appendChild(notizen);
  div.appendChild(arbeitenDiv);
  div.appendChild(preis);

  return div;
}

function addGeraet() {
  document.getElementById("container").appendChild(createGeraet());
}

function updateSumme() {
  let sum = 0;

  document.querySelectorAll(".preis").forEach(el => {
    let v = parseFloat(el.value.replace(",", "."));
    if (isNaN(v)) return;

    let menge = 1;

    // prüfen ob es ein Tool ist
    const parent = el.parentElement;
    const mengeInput = parent.querySelector('input[type="number"]');

    if (mengeInput) {
      let m = parseFloat(mengeInput.value);
      if (!isNaN(m)) menge = m;
    }

    sum += v * menge;
  });

  document.getElementById("gesamtpreis").value =
    sum.toFixed(2).replace(".", ",") + " €";
}

function toggleAngebot() {
  const aktiv = document.getElementById("angebotToggle").checked;

  document.getElementById("title").innerText = aktiv ? "Angebot" : "Werkstattzettel";
  document.getElementById("gesamtBlock").style.display = aktiv ? "block" : "none";
  document.getElementById("positionsliste").style.display = aktiv ? "block" : "none";
  document.getElementById("positionsTitel").style.display = aktiv ? "block" : "none";
  document.getElementById("addToolBtn").style.display = aktiv ? "block" : "none";
  document.getElementById("toolsTitel").style.display = aktiv ? "block" : "none";
  document.getElementById("toolsContainer").style.display = aktiv ? "block" : "none";

  document.querySelectorAll(".preis").forEach(p => {
    p.style.display = aktiv ? "block" : "none";
  });
}

function generatePositionsliste() {
  let pos = 1;
  
  const liste = document.getElementById("positionsliste");
  liste.innerHTML = "";

 document.querySelectorAll("#container .geraet").forEach(g => {

    const modell = g.querySelector("input").value;

    const arbeiten = [];
    g.querySelectorAll("label").forEach(label => {
      const cb = label.querySelector("input");
      if (cb && cb.checked) {
        arbeiten.push(label.innerText.trim());
      }
    });

    const preis = g.querySelector(".preis").value;

    if (modell.trim() !== "") {

      const div = document.createElement("div");
      div.className = "position";

      const text = document.createElement("div");
     text.innerText = pos + "  " + modell + " – " + arbeiten.join(", ");pos++;

      const price = document.createElement("div");
      let v = parseFloat(preis.replace(",", "."));
if (!isNaN(v)) {
  price.innerText = v.toFixed(2).replace(".", ",") + " €";
}

      div.appendChild(text);
      div.appendChild(price);

      liste.appendChild(div);
    }

  });
 document.querySelectorAll("#toolsContainer .geraet").forEach(t => {

  const mengeEl = t.querySelector(".tool-menge");
  const beschreibungEl = t.querySelector(".tool-beschreibung");
  const preisEl = t.querySelector(".preis");

  if (!beschreibungEl || !preisEl) return;

  const menge = mengeEl.value;
  const beschreibung = beschreibungEl.value.trim();
  const preis = preisEl.value.trim();

  // 👉 NUR wenn wirklich Artikel gewählt wurde
  if (beschreibung === "") return;

  let p = parseFloat(preis.replace(",", "."));
  let m = parseFloat(menge);

  if (isNaN(p) || isNaN(m)) return;

  const div = document.createElement("div");
  div.className = "position";

  const text = document.createElement("div");
  text.innerText = pos + "  " + beschreibung + " (x" + m + ")";

  const price = document.createElement("div");
  price.innerText = (p * m).toFixed(2).replace(".", ",") + " €";

  div.appendChild(text);
  div.appendChild(price);
  liste.appendChild(div);

  pos++; return pos;
});
}

function drucken() {
  
  // 👉 Prüfen ob Werkzeuge vorhanden sind
let hasTools = false;
  

// 👉 Werkzeuge-Titel & Container ausblenden wenn leer
if (!hasTools) {
  document.getElementById("toolsTitel").style.display = "none";
  document.getElementById("toolsContainer").style.display = "none";
}

  // 👉 Prüfen ob Geräte Inhalt haben
  let hasGeraet = false;
  document.querySelectorAll("#container .geraet").forEach(g => {
    const modell = g.querySelector("input");
    if (modell && modell.value.trim()) {
      hasGeraet = true;
    }
  });

  // 👉 Geräte-Titel ausblenden wenn leer
  if (!hasGeraet) {
    document.getElementById("geraeteTitel").style.display = "none";
  }

  // 👉 Textareas korrekt schrumpfen
  document.querySelectorAll("textarea").forEach(el => {
    el.style.height = "auto";
    el.style.height = el.scrollHeight + "px";
  });

  // 👉 Notizen Label hinzufügen
  document.querySelectorAll("textarea").forEach(el => {
    if (el.value.trim()) {
      el.value = "Notizen: " + el.value;
    }
  });

  // 👉 Nur angehaktes anzeigen
  document.querySelectorAll(".geraet label").forEach(label => {
    const cb = label.querySelector("input");
    if (cb && !cb.checked) label.style.display = "none";
  });

  // 👉 Leere Felder ausblenden
  document.querySelectorAll("input, textarea").forEach(el => {
    if (!el.value) el.style.display = "none";
  });

  // 👉 Preise formatieren
  document.querySelectorAll(".preis").forEach(el => {
    if (el.value) {
      let v = parseFloat(el.value.replace(",", "."));
      if (!isNaN(v)) {
        el.value = v.toFixed(2).replace(".", ",") + " €";
      }
    }
  });

  let nextPos = generatePositionsliste();
generateToolsTable(nextPos);

  function generateToolsTable(startPos) {

  const table = document.getElementById("toolsTable");
  const tbody = table.querySelector("tbody");
  tbody.innerHTML = "";

  let pos = startPos;
  let hasTools = false;

  document.querySelectorAll("#toolsContainer .geraet").forEach(t => {

    const menge = t.querySelector(".tool-menge")?.value;
    const beschreibung = t.querySelector(".tool-beschreibung")?.value.trim();
    const preis = t.querySelector(".preis")?.value;
    const artikelSelect = t.querySelector("select");

    const artikelNr = artikelSelect?.value || "";

    if (!beschreibung) return;

    let p = parseFloat(preis.replace(",", "."));
    let m = parseFloat(menge);

    if (isNaN(p) || isNaN(m)) return;

    hasTools = true;

    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${pos}</td>
      <td>${artikelNr}</td>
      <td>${beschreibung}</td>
      <td>${m}</td>
      <td>${p.toFixed(2).replace(".", ",")} €</td>
      <td>${(p * m).toFixed(2).replace(".", ",")} €</td>
    `;

    tbody.appendChild(tr);

    pos++;
  });

  // anzeigen oder verstecken
  document.getElementById("toolsTableTitle").style.display = hasTools ? "block" : "none";
  table.style.display = hasTools ? "table" : "none";

  return pos;
}

  window.print();
}

// Events

document.getElementById("addBtn").addEventListener("click", addGeraet);
document.getElementById("printBtn").addEventListener("click", drucken);
document.getElementById("angebotToggle").addEventListener("change", toggleAngebot);


</script>

</body>
</html>
